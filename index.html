<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amor ❤️</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      overflow:hidden;
      font-family:'Poppins', sans-serif;
      background:linear-gradient(135deg,#ff4f81,#ff9ec4);
      position:relative;
    }

    /* Corações flutuando */
    .heart{
      position:absolute;
      color:#ff0055;
      font-size:25px;
      animation:float 6s linear infinite;
      opacity:0.7;
    }

    @keyframes float{
      0%{
        transform:translateY(100vh) scale(0.5);
        opacity:0;
      }
      50%{
        opacity:1;
      }
      100%{
        transform:translateY(-120px) scale(1.2);
        opacity:0;
      }
    }

    .card{
      background:rgba(255,255,255,0.15);
      backdrop-filter:blur(10px);
      border:2px solid rgba(255,255,255,0.3);
      padding:50px;
      border-radius:30px;
      text-align:center;
      box-shadow:0 10px 40px rgba(0,0,0,0.25);
      animation:entrada 1.5s ease;
      position:relative;
      z-index:2;
    }

    .rosa{
      font-size:70px;
      animation:pulse 2s infinite;
    }

    h1{
      margin-top:20px;
      color:white;
      font-size:2.5rem;
      text-shadow:2px 2px 10px rgba(0,0,0,0.3);
    }

    .nome{
      color:#ffe066;
      font-weight:bold;
    }

    .mensagem{
      margin-top:15px;
      color:#fff;
      font-size:1.2rem;
    }

    @keyframes pulse{
      0%{
        transform:scale(1);
      }
      50%{
        transform:scale(1.15);
      }
      100%{
        transform:scale(1);
      }
    }

    @keyframes entrada{
      from{
        opacity:0;
        transform:translateY(40px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }
  </style>
</head>

<body>

  <!-- Corações -->
  <div class="heart" style="left:10%; animation-delay:0s;">❤️</div>
  <div class="heart" style="left:20%; animation-delay:2s;">💖</div>
  <div class="heart" style="left:35%; animation-delay:4s;">💕</div>
  <div class="heart" style="left:50%; animation-delay:1s;">❤️</div>
  <div class="heart" style="left:65%; animation-delay:3s;">💗</div>
  <div class="heart" style="left:80%; animation-delay:5s;">💞</div>

  <!-- Card -->
  <div class="card">
    <div class="rosa">🌹</div>

    <h1>
      Eu <span class="nome">Davi Cruz</span><br>
      amo o <span class="nome">PH Cardoso</span> ❤️
    </h1>

    <p class="mensagem">
      “Um amor cheio de carinho, rosas e corações!”
    </p>
  </div>

</body>
</html>
